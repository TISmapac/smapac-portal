# Configuración de despliegue en Netlify.
# El sitio es una exportación estática de Next.js (output: "export" en next.config.mjs):
# Netlify corre el build y publica el contenido de /out tal cual, sin SSR.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"
